<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Wash — Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">

  <div class="login-card">
    <h1>🚗 El Punto Car Wash</h1>
    <p class="subtitle" id="login-subtitle">Inicia sesión para continuar</p>

    <div class="form-group">
      <label>Correo</label>
      <input type="email" id="email" placeholder="empleado@carwash.com">
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>

    <button id="btn-principal">Entrar</button>

    <div class="login-separador">
      <span>¿No tienes cuenta?</span>
      <button id="btn-toggle" class="btn-toggle">Crear cuenta</button>
    </div>

    <p id="error-msg" class="error-msg"></p>
    <p id="success-msg" class="success-msg"></p>
  </div>

  <script type="module">
    import { supabase } from './js/supabaseClient.js';

    let modo = 'login'; // 'login' o 'registro'

    const btnPrincipal = document.getElementById('btn-principal');
    const btnToggle    = document.getElementById('btn-toggle');
    const errMsg       = document.getElementById('error-msg');
    const okMsg        = document.getElementById('success-msg');
    const subtitle     = document.getElementById('login-subtitle');

    // Alternar entre login y registro
    btnToggle.addEventListener('click', () => {
      errMsg.textContent = '';
      okMsg.textContent  = '';
      if (modo === 'login') {
        modo = 'registro';
        subtitle.textContent    = 'Crea tu cuenta';
        btnPrincipal.textContent = 'Crear cuenta';
        btnToggle.textContent   = 'Ya tengo cuenta';
      } else {
        modo = 'login';
        subtitle.textContent    = 'Inicia sesión para continuar';
        btnPrincipal.textContent = 'Entrar';
        btnToggle.textContent   = 'Crear cuenta';
      }
    });

    // Acción principal
    btnPrincipal.addEventListener('click', async () => {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      errMsg.textContent = '';
      okMsg.textContent  = '';

      if (!email || !password) {
        errMsg.textContent = 'Ingresa correo y contraseña';
        return;
      }

      if (modo === 'login') {
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
          errMsg.textContent = 'Correo o contraseña incorrectos';
        } else {
          window.location.href = 'cobro.html';
        }
      } else {
        const { error } = await supabase.auth.signUp({ email, password });
        if (error) {
          errMsg.textContent = 'Error al crear cuenta: ' + error.message;
        } else {
          okMsg.textContent = '✅ Cuenta creada, ya puedes iniciar sesión';
          modo = 'login';
          subtitle.textContent     = 'Inicia sesión para continuar';
          btnPrincipal.textContent = 'Entrar';
          btnToggle.textContent    = 'Crear cuenta';
        }
      }
    });
  </script>

</body>
</html>
